<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>残業時間管理</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d26;
    --surface2: #22263a;
    --border: #2e3248;
    --text: #e8eaf6;
    --text-dim: #7b82a8;
    --accent: #5c6bc0;
    --accent-light: #7986cb;
    --ok: #43a047;
    --warn: #fb8c00;
    --danger: #e53935;
    --holiday: #546e7a;
    --radius: 12px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px 16px 60px;
  }

  h1 { font-size: 20px; font-weight: 700; letter-spacing: .5px; color: var(--accent-light); }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .period-label { font-size: 13px; color: var(--text-dim); }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
  }

  .card-title {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    margin-bottom: 12px;
  }

  /* ── Progress ── */
  .big-number { font-size: 48px; font-weight: 700; line-height: 1; font-variant-numeric: tabular-nums; }
  .big-number span { font-size: 18px; font-weight: 400; color: var(--text-dim); }

  .total-sub {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 4px;
  }

  .progress-bar-wrap {
    background: var(--surface2);
    border-radius: 8px;
    height: 10px;
    margin-top: 14px;
    overflow: hidden;
  }

  .progress-bar { height: 100%; border-radius: 8px; transition: width .4s ease; }

  .progress-info {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 6px;
  }

  /* ── Warning ── */
  .warning-banner {
    display: none;
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 16px;
    line-height: 1.5;
  }
  .warning-banner.warn   { display: block; background: rgba(251,140,0,.15); border: 1px solid var(--warn);   color: var(--warn); }
  .warning-banner.danger { display: block; background: rgba(229,57,53,.15);  border: 1px solid var(--danger); color: var(--danger); }

  /* ── Weeks ── */
  .weeks-grid { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; }
  .weeks-grid::-webkit-scrollbar { height: 3px; }
  .weeks-grid::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .week-box { flex: 1 0 0; min-width: 60px; }

  /* ── Annual ── */
  .annual-header {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 14px;
  }
  .annual-total { font-size: 28px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .annual-total span { font-size: 14px; font-weight: 400; color: var(--text-dim); }
  .annual-sub { font-size: 12px; color: var(--text-dim); }

  .months-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 6px;
  }

  .month-box {
    background: var(--surface2);
    border-radius: 6px;
    padding: 8px 4px;
    text-align: center;
  }
  .month-box.current-month { border: 1px solid var(--accent); }
  .month-box.future-month  { opacity: .45; }
  .month-box .mlabel { font-size: 11px; color: var(--text-dim); margin-bottom: 3px; }
  .month-box .mval   { font-size: 15px; font-weight: 700; font-variant-numeric: tabular-nums; line-height: 1.2; }
  .month-box .mval span { font-size: 10px; font-weight: 400; color: var(--text-dim); }

  .week-box {
    background: var(--surface2);
    border-radius: 8px;
    padding: 12px 8px;
    text-align: center;
  }

  .week-box .wlabel { font-size: 11px; color: var(--text-dim); margin-bottom: 4px; }
  .week-box .wval   { font-size: 20px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .week-box .wval span { font-size: 11px; font-weight: 400; color: var(--text-dim); }
  .week-box.current { border: 1px solid var(--accent); }
  .week-box { cursor: pointer; transition: background .15s; }
  .week-box:hover { background: #2a2f47; }
  .week-box.selected { background: #2a2f47; border-color: var(--accent-light); }

  .week-detail {
    margin-top: 12px;
    border-top: 1px solid var(--border);
    padding-top: 12px;
    display: none;
  }
  .week-detail.open { display: block; }
  .week-detail-title { font-size: 12px; color: var(--text-dim); margin-bottom: 8px; }
  .week-detail table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .week-detail td { padding: 8px 6px; border-bottom: 1px solid var(--border); vertical-align: top; }
  .week-detail tr:last-child td { border-bottom: none; }

  /* ── Input ── */
  .tab-bar { display: flex; gap: 6px; margin-bottom: 14px; }

  .tab-btn {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-dim);
    font-size: 13px;
    padding: 8px;
    cursor: pointer;
    transition: all .15s;
  }
  .tab-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .input-panel { display: none; }
  .input-panel.active { display: block; }

  .form-row { display: flex; gap: 10px; align-items: flex-end; }
  .form-row + .form-row { margin-top: 10px; }

  .form-group { display: flex; flex-direction: column; gap: 5px; flex: 1; }
  .form-group label { font-size: 12px; color: var(--text-dim); }

  .form-group input,
  .form-group select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 15px;
    padding: 10px 12px;
    outline: none;
    transition: border-color .15s;
    width: 100%;
  }
  .form-group input:focus,
  .form-group select:focus { border-color: var(--accent); }
  .form-group input::placeholder { color: var(--text-dim); }
  .form-group select option { background: var(--surface2); }

  .memo-row { margin-top: 10px; }
  .memo-row input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 14px;
    padding: 9px 12px;
    outline: none;
    transition: border-color .15s;
    width: 100%;
  }
  .memo-row input:focus { border-color: var(--accent); }
  .memo-row input::placeholder { color: var(--text-dim); }
  .memo-label { font-size: 12px; color: var(--text-dim); margin-bottom: 5px; }

  .time-hint { font-size: 11px; color: var(--text-dim); margin-top: 4px; }

  .btn {
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    padding: 10px 20px;
    cursor: pointer;
    transition: background .15s;
    white-space: nowrap;
  }
  .btn:hover { background: var(--accent-light); }

  .btn-sm { font-size: 12px; padding: 6px 12px; border-radius: 6px; }

  .btn-danger {
    background: transparent;
    border: 1px solid var(--danger);
    color: var(--danger);
  }
  .btn-danger:hover { background: rgba(229,57,53,.15); }

  /* ── Log table ── */
  .log-table { width: 100%; border-collapse: collapse; font-size: 13px; }

  .log-table th {
    text-align: left;
    font-size: 11px;
    color: var(--text-dim);
    padding: 6px 8px;
    border-bottom: 1px solid var(--border);
  }

  .log-table td {
    padding: 9px 8px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }

  .log-table tr:last-child td { border-bottom: none; }
  .log-table tr:hover td { background: rgba(255,255,255,.02); }

  .memo-text {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 180px;
  }

  .hbadge {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    padding: 1px 5px;
    border-radius: 4px;
    background: rgba(84,110,122,.25);
    color: #90a4ae;
    margin-left: 5px;
    vertical-align: middle;
  }

  .export-row { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }

  .error-msg { color: var(--danger); font-size: 12px; margin-top: 6px; min-height: 16px; }

  @media (max-width: 520px) {
    .weeks-grid { grid-template-columns: repeat(2, 1fr); }
    .big-number { font-size: 36px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>残業管理</h1>
  <div class="period-label" id="periodLabel">集計期間: ...</div>
</div>

<div class="warning-banner" id="warningBanner"></div>

<!-- Monthly progress -->
<div class="card">
  <div class="card-title">今期の残業時間</div>
  <div class="big-number" id="totalDisplay">0<span>h</span></div>
  <div class="total-sub" id="totalSub"></div>
  <div class="progress-bar-wrap">
    <div class="progress-bar" id="progressBar" style="width:0%;background:var(--ok)"></div>
  </div>
  <div class="progress-info">
    <span id="remainLabel">残り 80h</span>
    <span>上限 80h</span>
  </div>
</div>

<!-- Weekly -->
<div class="card">
  <div class="card-title">週別</div>
  <div class="weeks-grid" id="weeksGrid"></div>
  <div class="week-detail" id="weekDetail"></div>
</div>

<!-- Annual -->
<div class="card">
  <div class="card-title">年間集計 <span id="annualPeriodLabel" style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--text-dim)"></span></div>
  <div class="annual-header">
    <div class="annual-total" id="annualTotal">0<span>h</span></div>
    <div class="annual-sub" id="annualSub"></div>
  </div>
  <div class="months-grid" id="monthsGrid"></div>
</div>

<!-- Input -->
<div class="card">
  <div class="card-title">残業を記録</div>
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('direct')">直接入力</button>
    <button class="tab-btn" onclick="switchTab('picker')">時刻選択</button>
  </div>

  <div class="input-panel active" id="panelDirect">
    <div class="form-row">
      <div class="form-group">
        <label>日付</label>
        <input type="date" id="directDate">
      </div>
      <div class="form-group">
        <label>時刻 (HHMM-HHMM) <span class="time-hint">例: 1700-2045</span></label>
        <input type="text" id="directTime" placeholder="1700-2045" maxlength="9">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <div class="memo-label">メモ（任意）</div>
        <input type="text" id="directMemo" placeholder="作業内容など">
      </div>
      <div class="form-group" style="flex:0 0 auto">
        <label>&nbsp;</label>
        <button class="btn" onclick="addDirect()">追加</button>
      </div>
    </div>
    <div class="error-msg" id="directError"></div>
  </div>

  <div class="input-panel" id="panelPicker">
    <div class="form-row">
      <div class="form-group">
        <label>日付</label>
        <input type="date" id="pickerDate">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>開始</label>
        <input type="time" id="pickerStart" value="17:00">
      </div>
      <div class="form-group">
        <label>終了</label>
        <input type="time" id="pickerEnd" value="19:00">
      </div>
      <div class="form-group" style="flex:0 0 auto">
        <label>&nbsp;</label>
        <button class="btn" onclick="addPicker()">追加</button>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <div class="memo-label">メモ（任意）</div>
        <input type="text" id="pickerMemo" placeholder="作業内容など">
      </div>
    </div>
    <div class="error-msg" id="pickerError"></div>
  </div>
</div>

<!-- Log -->
<div class="card">
  <div class="card-title">記録一覧</div>
  <table class="log-table">
    <thead>
      <tr>
        <th>日付</th>
        <th>時間</th>
        <th>開始〜終了 / メモ</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="logBody"></tbody>
  </table>
  <div class="export-row">
    <button class="btn btn-sm" onclick="exportData()">エクスポート</button>
    <button class="btn btn-sm" onclick="document.getElementById('importFile').click()">インポート</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
  </div>
</div>

<script>
// ─── Japan public holidays 2024-2026 ───────────────────────────────────────
const JP_HOLIDAYS = new Set([
  // 2024
  '2024-01-01','2024-01-08','2024-02-11','2024-02-12','2024-02-23',
  '2024-03-20','2024-04-29','2024-05-03','2024-05-04','2024-05-05','2024-05-06',
  '2024-07-15','2024-08-11','2024-08-12','2024-09-16','2024-09-22','2024-09-23',
  '2024-10-14','2024-11-03','2024-11-04','2024-11-23',
  // 2025
  '2025-01-01','2025-01-13','2025-02-11','2025-02-23','2025-02-24',
  '2025-03-20','2025-04-29','2025-05-03','2025-05-04','2025-05-05','2025-05-06',
  '2025-07-21','2025-08-11','2025-09-15','2025-09-22','2025-09-23',
  '2025-10-13','2025-11-03','2025-11-23','2025-11-24',
  // 2026
  '2026-01-01','2026-01-12','2026-02-11','2026-02-23',
  '2026-03-20','2026-04-29','2026-05-03','2026-05-04','2026-05-05',
  '2026-07-20','2026-08-11','2026-09-21','2026-09-22','2026-09-23',
  '2026-10-12','2026-11-03','2026-11-23',
]);

function isHolidayDay(dateStr) {
  if (JP_HOLIDAYS.has(dateStr)) return true;
  const d = new Date(dateStr + 'T00:00:00');
  const dow = d.getDay();
  return dow === 0 || dow === 6;
}

// ─── Holiday minute calculation ─────────────────────────────────────────────
// Weekday holiday zones: 00:00-08:30 and 22:00-24:00 (in minutes: 0-510, 1320-1440)
const LATE_START = 22 * 60;       // 1320
const LATE_END   = 24 * 60;       // 1440
const EARLY_END  = 8 * 60 + 30;   // 510

function calcHolidayMinutes(dateStr, startStr, endStr) {
  const [sh, sm] = startStr.split(':').map(Number);
  const [eh, em] = endStr.split(':').map(Number);
  let startAbs = sh * 60 + sm;
  let endAbs   = eh * 60 + em;
  if (endAbs <= startAbs) endAbs += 1440;

  let regular = 0, holiday = 0;

  // Iterate per minute (max ~720 iterations — fast enough)
  const baseDate = new Date(dateStr + 'T00:00:00');
  for (let m = startAbs; m < endAbs; m++) {
    const dayOffset = Math.floor(m / 1440);
    const minInDay  = m % 1440;
    const d = new Date(baseDate);
    d.setDate(d.getDate() + dayOffset);
    const ds = d.toISOString().slice(0, 10);

    if (isHolidayDay(ds)) {
      holiday++;
    } else {
      // Weekday: late night / early morning = holiday hours
      if (minInDay < EARLY_END || minInDay >= LATE_START) {
        holiday++;
      } else {
        regular++;
      }
    }
  }

  return { regular, holiday };
}

// ─── Storage ────────────────────────────────────────────────────────────────
const STORE_KEY = 'overtime_v2';

function load() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || []; }
  catch { return []; }
}

function save(records) { localStorage.setItem(STORE_KEY, JSON.stringify(records)); }

// ─── Period helpers ─────────────────────────────────────────────────────────
function getPeriod(today = new Date()) {
  const y = today.getFullYear(), m = today.getMonth(), d = today.getDate();
  let sY, sM, eY, eM;
  if (d >= 11) {
    sY = y; sM = m;
    eY = m === 11 ? y + 1 : y; eM = m === 11 ? 0 : m + 1;
  } else {
    sY = m === 0 ? y - 1 : y; sM = m === 0 ? 11 : m - 1;
    eY = y; eM = m;
  }
  return { start: new Date(sY, sM, 11), end: new Date(eY, eM, 10) };
}

function fmtDate(d) {
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
}

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getWeekRanges(periodStart, periodEnd) {
  // Find the Monday on or before periodStart
  const dow = periodStart.getDay(); // 0=Sun
  const offset = dow === 0 ? -6 : 1 - dow;
  const firstMon = new Date(periodStart);
  firstMon.setDate(firstMon.getDate() + offset);

  const weeks = [];
  let ws = new Date(firstMon);
  while (ws <= periodEnd) {
    const we = new Date(ws); we.setDate(we.getDate() + 6); // Sunday
    weeks.push({
      start: new Date(Math.max(ws.getTime(), periodStart.getTime())),
      end:   new Date(Math.min(we.getTime(), periodEnd.getTime())),
    });
    ws.setDate(ws.getDate() + 7);
  }
  return weeks;
}

function periodDayIndex(dateStr, periodStart) {
  return Math.round((new Date(dateStr + 'T00:00:00') - periodStart) / 86400000);
}

// Annual period: July 11 → next July 10
function getAnnualPeriod(today = new Date()) {
  const y = today.getFullYear(), m = today.getMonth(), d = today.getDate();
  const startY = (m > 6 || (m === 6 && d >= 11)) ? y : y - 1;
  return {
    start: new Date(startY, 6, 11),
    end:   new Date(startY + 1, 6, 10),
    startYear: startY,
  };
}

// 12 monthly periods within the annual period
function getAnnualMonths(annualStart) {
  return Array.from({ length: 12 }, (_, i) => {
    const s = new Date(annualStart); s.setMonth(s.getMonth() + i);
    const e = new Date(s); e.setMonth(e.getMonth() + 1); e.setDate(10);
    return {
      startStr: s.toISOString().slice(0, 10),
      endStr:   e.toISOString().slice(0, 10),
      label:    `${s.getMonth() + 1}月`,
    };
  });
}

function fmtMin(min) {
  const h = Math.floor(min / 60), m = min % 60;
  return m === 0 ? `${h}h` : `${h}h${String(m).padStart(2,'0')}m`;
}

// ─── Init ───────────────────────────────────────────────────────────────────
document.getElementById('directDate').value = todayStr();
document.getElementById('pickerDate').value = todayStr();

// Date auto-confirm: blur and focus next field
document.getElementById('directDate').addEventListener('change', function() {
  this.blur();
  document.getElementById('directTime').focus();
});
document.getElementById('pickerDate').addEventListener('change', function() {
  this.blur();
  document.getElementById('pickerStart').focus();
});

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b, i) =>
    b.classList.toggle('active', (i===0 && tab==='direct') || (i===1 && tab==='picker')));
  document.getElementById('panelDirect').classList.toggle('active', tab==='direct');
  document.getElementById('panelPicker').classList.toggle('active', tab==='picker');
}

// ─── Parse ──────────────────────────────────────────────────────────────────
function parseDirectTime(str) {
  str = str.trim().replace(/\s/g,'');
  const m = str.match(/^(\d{2}):?(\d{2})-(\d{2}):?(\d{2})(\+1)?$/);
  if (!m) return null;
  const sh = parseInt(m[1]), sm = parseInt(m[2]);
  const eh = parseInt(m[3]), em = parseInt(m[4]);
  if (sh>23||sm>59||eh>23||em>59) return null;
  let diff = (eh*60+em) - (sh*60+sm);
  if (m[5]) diff += 1440;
  if (diff <= 0) diff += 1440;
  if (diff <= 0 || diff > 720) return null;
  return {
    start: `${String(sh).padStart(2,'0')}:${String(sm).padStart(2,'0')}`,
    end:   `${String(eh).padStart(2,'0')}:${String(em).padStart(2,'0')}`,
    minutes: diff,
  };
}

// ─── Add ────────────────────────────────────────────────────────────────────
function addDirect() {
  const errEl = document.getElementById('directError');
  errEl.textContent = '';
  const date = document.getElementById('directDate').value;
  const parsed = parseDirectTime(document.getElementById('directTime').value);
  const memo = document.getElementById('directMemo').value.trim();
  if (!date) { errEl.textContent = '日付を選択してください'; return; }
  if (!parsed) { errEl.textContent = '形式が正しくありません（例: 1700-2045）'; return; }
  addRecord(date, parsed.start, parsed.end, parsed.minutes, memo);
  document.getElementById('directTime').value = '';
  document.getElementById('directMemo').value = '';
}

function addPicker() {
  const errEl = document.getElementById('pickerError');
  errEl.textContent = '';
  const date  = document.getElementById('pickerDate').value;
  const start = document.getElementById('pickerStart').value;
  const end   = document.getElementById('pickerEnd').value;
  const memo  = document.getElementById('pickerMemo').value.trim();
  if (!date||!start||!end) { errEl.textContent = '全項目を入力してください'; return; }
  const [sh,sm] = start.split(':').map(Number);
  const [eh,em] = end.split(':').map(Number);
  let diff = (eh*60+em) - (sh*60+sm);
  if (diff<=0) diff += 1440;
  if (diff>720) { errEl.textContent = '12時間を超える残業は入力できません'; return; }
  addRecord(date, start, end, diff, memo);
  document.getElementById('pickerMemo').value = '';
}

function addRecord(date, start, end, minutes, memo) {
  const { regular, holiday } = calcHolidayMinutes(date, start, end);
  const records = load();
  records.push({ id: Date.now(), date, start, end, minutes, regular, holiday, memo: memo || '' });
  records.sort((a,b) => a.date.localeCompare(b.date));
  save(records);
  render();
}

function deleteRecord(id) {
  save(load().filter(r => r.id !== id));
  render();
}

// ─── Render ─────────────────────────────────────────────────────────────────
function render() {
  const today = new Date();
  const period = getPeriod(today);
  const records = load();

  const startStr = period.start.toISOString().slice(0,10);
  const endStr   = period.end.toISOString().slice(0,10);
  const inPeriod = records.filter(r => r.date >= startStr && r.date <= endStr);

  const totalMin   = inPeriod.reduce((s,r) => s + r.minutes, 0);
  const holidayMin = inPeriod.reduce((s,r) => s + (r.holiday || 0), 0);
  const regularMin = totalMin - holidayMin;

  // Period label
  document.getElementById('periodLabel').textContent =
    `${fmtDate(period.start)} 〜 ${fmtDate(period.end)}`;

  // Big number
  const dH = Math.floor(totalMin/60), dM = totalMin%60;
  document.getElementById('totalDisplay').innerHTML =
    `${dH}<span>h</span>${dM>0 ? `<span style="font-size:24px;font-weight:700;color:var(--text)">${String(dM).padStart(2,'0')}</span><span>m</span>` : ''}`;

  // Sub: holiday breakdown (subtle)
  const subEl = document.getElementById('totalSub');
  if (holidayMin > 0) {
    subEl.textContent = `うち休日・深夜 ${fmtMin(holidayMin)} / 通常 ${fmtMin(regularMin)}`;
  } else {
    subEl.textContent = '';
  }

  // Progress
  const pct = Math.min(totalMin / 80 / 60 * 100, 100);
  const bar = document.getElementById('progressBar');
  bar.style.width = pct + '%';
  bar.style.background = pct >= 100 ? 'var(--danger)' : pct >= 75 ? 'var(--warn)' : 'var(--ok)';

  const remainMin = Math.max(0, 80*60 - totalMin);
  document.getElementById('remainLabel').textContent = `残り ${fmtMin(remainMin)}`;

  // Warning — priority: highest first
  const warnEl = document.getElementById('warningBanner');
  warnEl.className = 'warning-banner';
  warnEl.textContent = '';

  if (totalMin >= 80*60) {
    warnEl.classList.add('danger');
    warnEl.textContent = `🚨 残業時間が上限の80時間を超えました（現在 ${fmtMin(totalMin)}）。`;
  } else if (totalMin >= 70*60) {
    warnEl.classList.add('danger');
    warnEl.textContent = `⚠️ 残業時間が70時間を超えました（現在 ${fmtMin(totalMin)}）。上限まで残り ${fmtMin(remainMin)} です。`;
  } else if (remainMin < 20*60) {
    warnEl.classList.add('danger');
    warnEl.textContent = `⚠️ 上限まで残り ${fmtMin(remainMin)} しかありません。ペースを落としてください。`;
  } else if (totalMin > 40*60) {
    warnEl.classList.add('warn');
    warnEl.textContent = `⚠️ 累計 ${fmtMin(totalMin)} の残業です。このペースだと上限80時間を超える可能性があります。`;
  }

  // Weekly grid
  const weeks = getWeekRanges(period.start, period.end);
  const weeksGrid = document.getElementById('weeksGrid');
  weeksGrid.innerHTML = '';
  let selectedWeekKey = null;

  function renderWeekDetail(ws, we, label, recs) {
    const detail = document.getElementById('weekDetail');
    if (detail._key === label) {
      detail.className = 'week-detail';
      detail.innerHTML = '';
      detail._key = null;
      document.querySelectorAll('.week-box').forEach(b => b.classList.remove('selected'));
      return;
    }
    detail._key = label;
    detail.className = 'week-detail open';
    const weekRecs = recs.filter(r => r.date >= ws && r.date <= we).reverse();
    if (!weekRecs.length) {
      detail.innerHTML = `<div class="week-detail-title">${label}　記録なし</div>`;
      return;
    }
    const rows = weekRecs.map(r => {
      const isHol = isHolidayDay(r.date);
      const hBadge = isHol ? '<span class="hbadge">休</span>' : (r.holiday > 0 ? `<span class="hbadge">深夜 ${fmtMin(r.holiday)}</span>` : '');
      const memoHtml = r.memo ? `<div class="memo-text" title="${escHtml(r.memo)}">📝 ${escHtml(r.memo)}</div>` : '';
      return `<tr>
        <td>${r.date.replace(/-/g,'/')}${hBadge}</td>
        <td><strong>${fmtMin(r.minutes)}</strong></td>
        <td><span style="color:var(--text-dim)">${r.start}〜${r.end}</span>${memoHtml}</td>
      </tr>`;
    }).join('');
    detail.innerHTML = `
      <div class="week-detail-title">${label}</div>
      <table><tbody>${rows}</tbody></table>
    `;
  }

  weeks.forEach((w, i) => {
    const ws = w.start.toISOString().slice(0,10);
    const we = w.end.toISOString().slice(0,10);
    const wRecs = inPeriod.filter(r => r.date >= ws && r.date <= we);
    const wMin  = wRecs.reduce((s,r) => s+r.minutes, 0);
    const wHol  = wRecs.reduce((s,r) => s+(r.holiday||0), 0);
    const isCurrent = todayStr() >= ws && todayStr() <= we;
    const label = `第${i+1}週 (${fmtDate(w.start).slice(5)} - ${fmtDate(w.end).slice(5)})`;
    const box = document.createElement('div');
    box.className = 'week-box' + (isCurrent ? ' current' : '');
    box.innerHTML = `
      <div class="wlabel">第${i+1}週</div>
      <div class="wlabel" style="font-size:10px">${fmtDate(w.start).slice(5)} - ${fmtDate(w.end).slice(5)}</div>
      <div class="wval">${Math.floor(wMin/60)}<span>h</span>${wMin%60>0?`${String(wMin%60).padStart(2,'0')}<span>m</span>`:''}</div>
      ${wHol>0 ? `<div style="font-size:10px;color:#90a4ae;margin-top:3px">休日 ${fmtMin(wHol)}</div>` : ''}
    `;
    box.addEventListener('click', () => {
      document.querySelectorAll('.week-box').forEach(b => b.classList.remove('selected'));
      const detail = document.getElementById('weekDetail');
      if (detail._key !== label) box.classList.add('selected');
      renderWeekDetail(ws, we, label, inPeriod);
    });
    weeksGrid.appendChild(box);
  });

  // Annual
  const annual = getAnnualPeriod(today);
  const annualMonths = getAnnualMonths(annual.start);
  const annualStartStr = annual.start.toISOString().slice(0,10);
  const annualEndStr   = annual.end.toISOString().slice(0,10);
  const inAnnual = records.filter(r => r.date >= annualStartStr && r.date <= annualEndStr);
  const annualMin = inAnnual.reduce((s,r) => s + r.minutes, 0);

  document.getElementById('annualPeriodLabel').textContent =
    `${annual.startYear}年7月 〜 ${annual.startYear + 1}年6月`;

  const aH = Math.floor(annualMin/60), aM = annualMin%60;
  document.getElementById('annualTotal').innerHTML =
    `${aH}<span>h</span>${aM>0?`<span style="font-size:16px;font-weight:700;color:var(--text)">${String(aM).padStart(2,'0')}</span><span>m</span>`:''}`;
  document.getElementById('annualSub').textContent = `上限 960h　残り ${fmtMin(Math.max(0, 960*60 - annualMin))}`;

  const monthsGrid = document.getElementById('monthsGrid');
  monthsGrid.innerHTML = '';
  const ts = todayStr();
  annualMonths.forEach(mo => {
    const mMin = inAnnual.filter(r => r.date >= mo.startStr && r.date <= mo.endStr)
                         .reduce((s,r) => s + r.minutes, 0);
    const isCur    = ts >= mo.startStr && ts <= mo.endStr;
    const isFuture = ts < mo.startStr;
    const box = document.createElement('div');
    box.className = 'month-box' + (isCur ? ' current-month' : '') + (isFuture ? ' future-month' : '');
    const mh = Math.floor(mMin/60), mm = mMin%60;
    box.innerHTML = `
      <div class="mlabel">${mo.label}</div>
      <div class="mval">${mh}<span>h</span>${mm>0?`${String(mm).padStart(2,'0')}<span>m</span>`:''}`;
    monthsGrid.appendChild(box);
  });

  // Log
  const logBody = document.getElementById('logBody');
  logBody.innerHTML = '';
  const sorted = [...inPeriod].reverse();
  if (!sorted.length) {
    logBody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:var(--text-dim);padding:20px">まだ記録がありません</td></tr>';
    return;
  }
  sorted.forEach(r => {
    const hol = r.holiday || 0;
    const isAllHoliday = isHolidayDay(r.date);
    const tr = document.createElement('tr');

    let dayLabel = r.date.replace(/-/g,'/');
    if (isAllHoliday) dayLabel += '<span class="hbadge">休</span>';

    let timeHtml = `<strong>${fmtMin(r.minutes)}</strong>`;
    if (hol > 0 && !isAllHoliday) {
      // Partial holiday (late night on weekday)
      timeHtml += `<span class="hbadge">深夜 ${fmtMin(hol)}</span>`;
    } else if (hol > 0 && isAllHoliday) {
      // Already shown by day label
    }

    const memoHtml = r.memo ? `<div class="memo-text" title="${escHtml(r.memo)}">📝 ${escHtml(r.memo)}</div>` : '';

    tr.innerHTML = `
      <td>${dayLabel}</td>
      <td>${timeHtml}</td>
      <td>
        <span style="color:var(--text-dim)">${r.start} 〜 ${r.end}</span>
        ${memoHtml}
      </td>
      <td><button class="btn btn-sm btn-danger" onclick="deleteRecord(${r.id})">削除</button></td>
    `;
    logBody.appendChild(tr);
  });
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── Export / Import ─────────────────────────────────────────────────────────
function exportData() {
  const blob = new Blob([JSON.stringify({ version: 2, records: load() }, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `overtime_${todayStr()}.json`;
  a.click();
}

function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      const imported = data.records || data;
      if (!Array.isArray(imported)) throw new Error();
      // Recalculate holiday minutes on import (handles old data format)
      imported.forEach(r => {
        if (r.holiday === undefined) {
          const h = calcHolidayMinutes(r.date, r.start, r.end);
          r.regular = h.regular;
          r.holiday = h.holiday;
        }
      });
      const existing = load();
      const ids = new Set(existing.map(r => r.id));
      const merged = [...existing, ...imported.filter(r => !ids.has(r.id))];
      merged.sort((a,b) => a.date.localeCompare(b.date));
      save(merged);
      render();
      alert(`${imported.length}件インポートしました`);
    } catch { alert('読み込みに失敗しました'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

render();
</script>
